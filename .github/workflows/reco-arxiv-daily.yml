# This is a basic workflow to help you get started with Actions

name: Run Arxiv Papers Daily

# Controls when the workflow will run
on:
  # 手动触发：Actions 页选择该 workflow 后 Run workflow
  workflow_dispatch:
  # 每天 22:00 UTC 自动跑（北京时间 06:00）
  schedule:
    - cron: "0 22 * * *"

env:

  GITHUB_USER_NAME: ShawnBIT
  GITHUB_USER_EMAIL: 13269590132@163.com
  
  
# A workflow run is made up of one or more jobs that run sequentially or in parallel
jobs:
  build:
    name: update
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许 workflow 向仓库 push 提交

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Set up Python Env
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install arxiv requests pyyaml
          
      - name: Run daily arxiv 
        run: |
          python3 daily_arxiv.py

      - name: Notify Feishu (send daily papers to group)
        if: success()
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_URL_2: ${{ secrets.FEISHU_WEBHOOK_URL_2 }}
        run: |
          pip3 install -q requests
          python3 .github/scripts/notify_feishu.py

      - name: Push reco-arxiv-daily updates
        uses: github-actions-x/commit@v2.9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Github Action: Auto Update Recommendation ArXiv Papers"
          # 提交主 README / docs / 每日增量；publish_wechat 为 true 时已包含 docs/wechat.md
          files: README.md daily_new.md docs/reco-arxiv-daily.json docs/reco-arxiv-daily-web.json docs/reco-arxiv-daily-extra.json docs/index.md docs/topic-recommendation.md docs/wechat.md
          rebase: 'true'
          name: ${{ env.GITHUB_USER_NAME }}
          email: ${{ env.GITHUB_USER_EMAIL }}
